name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "torch>=2.12,<2.13" \
            --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[api,training,dev]"

      - name: Train baseline artifacts for tests
        run: python -m phishing_ml.training.train_baseline

      - name: Evaluate baseline model
        run: python -m phishing_ml.evaluation.evaluate_baseline

      - name: Run model quality gate
        run: python -m phishing_ml.evaluation.quality_gate

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest

      - name: Validate Docker Compose config
        run: docker compose config