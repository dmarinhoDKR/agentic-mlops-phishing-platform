name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Train baseline artifacts for tests
        run: python -m phishing_ml.training.train_baseline

      - name: Evaluate baseline model
        run: python -m phishing_ml.evaluation.evaluate_baseline

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest

      - name: Validate Docker Compose config
        run: docker compose config